name: daily-build

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "data/**"
      - "docs/**"
      - "scripts/**"
      - ".github/workflows/daily.yml"
  schedule:
    - cron: "25 1 * * *"   # Every day at 01:25 UTC

permissions:
  contents: write
  issues: write             # needed to create Issues

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch daily candidates & create Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/fetch_candidates.py --issue

      - name: Build README and pages
        run: python scripts/build.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "build: refresh pages $(date -u +%Y-%m-%d)"
            git push
          fi
