name: weekly-link-check

# Deep validation is intentionally split out of daily-curation.yml: verifying
# every paper/repo/homepage link and refreshing GitHub star counts requires
# live network calls that are slow and occasionally flaky (rate limits,
# transient 5xx). Running it weekly keeps the daily pipeline fast and robust
# while still catching dead links and stale stats regularly.

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1" # Weekly on Monday at 03:00 UTC

permissions:
  contents: write

concurrency:
  group: awesome-generative-models-weekly-link-check
  cancel-in-progress: false

jobs:
  link-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Validate links and refresh repo-stats cache
        id: validate
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/validate_data.py --write-cache

      - name: Build README and pages
        run: python scripts/build.py

      - name: Commit refreshed cache and pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: weekly link check and repo-stats refresh $(date -u +%Y-%m-%d)"
            git push
          fi

      # The validate step is allowed to fail without skipping the commit
      # above, so that a broken link found this week doesn't also block the
      # (still valid) refreshed stats for every other entry from shipping.
      # This step turns the job red for visibility once that commit is safe.
      - name: Surface broken links, if any
        if: steps.validate.outcome == 'failure'
        run: |
          echo "::error::Broken links or semantic mismatches were found -- see metadata/validation/latest.md (just committed)."
          exit 1
